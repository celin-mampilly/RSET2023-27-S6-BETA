<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Monitoring</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
display:flex;
}

.sidebar{
width:240px;
background:#111827;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#cbd5e1;
padding:12px;
text-decoration:none;
border-radius:8px;
margin-bottom:10px;
}

.sidebar a.active{
background:#2563eb;
color:white;
}

.main{
flex:1;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.online{
background:#16a34a;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

.stop-btn{
background:#ef4444;
padding:10px 20px;
border-radius:10px;
border:none;
color:white;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.card h3{
color:#94a3b8;
font-size:14px;
}

.card h1{
margin-top:10px;
}

.camera{
background:#1e293b;
height:350px;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>SecureWatch</h2>

<a href="index.html">Dashboard</a>
<a class="active" href="live-monitoring.html">Live Monitoring</a>
<a href="#">Alerts</a>
<a href="#">History</a>

</div>


<div class="main">

<div class="header">
<h1>Live Monitoring</h1>

<div>
<span class="online">ONLINE</span>
<button class="stop-btn" onclick="stopCamera()">Stop Monitoring</button>
</div>

</div>


<div class="cards">

<div class="card">
<h3>Camera Status</h3>
<h1 style="color:#22c55e">ONLINE</h1>
</div>

<div class="card">
<h3>Total Alerts</h3>
<h1>57</h1>
</div>

<div class="card">
<h3>Active Time</h3>
<h1>12h 41m</h1>
</div>

<div class="card">
<h3>Last Detection</h3>
<h1>6m ago</h1>
</div>

</div>


<div class="camera">
<video id="camera" autoplay></video>
</div>

</div>


<script>

let stream;

async function startCamera(){

stream = await navigator.mediaDevices.getUserMedia({video:true});

document.getElementById("camera").srcObject = stream;

}

function stopCamera(){

stream.getTracks().forEach(track => track.stop());

}

startCamera();

</script>

</body>
</html>
